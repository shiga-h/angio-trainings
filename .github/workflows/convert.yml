name: Excel → data.json 自動変換

# xlsx が main に push されたら、今回追加/変更された xlsx を検出して convert.py を実行し
# data.json を再生成する。また、対象外の古い xlsx はリポジトリから自動削除する。
# 手動実行も可能 (Actions タブから Run workflow)。

on:
  push:
    branches: [main]
    paths:
      - '**.xlsx'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 直前のコミットとの diff 用

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: 対象 xlsx を特定
        id: xlsx
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # 手動実行: リポジトリ内の xlsx (~$temp を除く) を検出
            TARGETS=$(ls -1 *.xlsx 2>/dev/null | grep -v '^~' || true)
            if [ -z "$TARGETS" ]; then
              echo "::error::xlsx が見つかりません"
              exit 1
            fi
            TARGET=$(echo "$TARGETS" | head -1)
          else
            # push イベント: 今回追加/変更された xlsx を検出
            TARGET=$(git diff --name-only --diff-filter=AM HEAD^ HEAD 2>/dev/null | grep '\.xlsx$' | head -1)
            if [ -z "$TARGET" ]; then
              echo "::error::今回の commit で追加/変更された xlsx が見つかりません"
              exit 1
            fi
          fi
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "対象ファイル: $TARGET"

      - name: Excel → data.json 変換
        run: python3 convert.py "${{ steps.xlsx.outputs.target }}"

      - name: 対象外の古い xlsx を削除
        run: |
          TARGET="${{ steps.xlsx.outputs.target }}"
          shopt -s nullglob
          for f in *.xlsx; do
            [ "$f" = "$TARGET" ] && continue
            case "$f" in '~$'*) continue ;; esac
            echo "古い xlsx を削除: $f"
            git rm -- "$f"
          done

      - name: data.json / 削除分を commit (差分がある場合のみ)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "変更なし。commit をスキップ。"
          else
            git commit -m "auto: convert Excel to data.json"
            git push
            echo "push 完了。Vercel が自動デプロイします。"
          fi
